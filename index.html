<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="name" class="headings">Name : </h1>
    <h2 id="name" class="headings">Greate : </h2>
    <h3 id="name" class="headings"> day : </h3>
    <h2></h2>
    <h3></h3>
    <button>Apply css</button>


    <h1>Counter </h1>
    <div>
        <button id="inc">+</button>
        <input type="number" id="res" min="0"></input>
        <button id="dec">-</button>
    </div>
    <div>
        <input type="number" id="firstNum" min="0"></input>
        <input type="number" id="secondNum" min="0"></input>
        <input type="text" name="" id="">
        <button>Add</button>
    </div>
    <div id="container"></div>
    <div class="form-container">
        <form class="user-details" id="user-details">
            <h1 class="user-details-form-heading">User Details</h1>
            <div class="input-container">
                <label for="name">Name</label>
                <input placeholder="enter your name" type="text" name="name" id="fullName">
            </div>
            <div class="input-container">
                <label for="email">Email</label>
                <input placeholder="enter your email" type="email" name="email" id="email">
            </div>

            <div class="input-container">
                <label for="address">Address</label>
                <input placeholder="enter your address" type="text" name="address" id="address">
            </div>
            <button class="user-details-btn" id="submit-form">Submit</button>
        </form>
    </div>

    <div>
        <h1>User Data</h1>
        <div id="showName"></div>
        <div id="showEmail"></div>
        <div id="showAddress"></div>
    </div>
    <script src="index.js"></script>
    <script src="calculate.js"></script>
    <script src="createUsersContainer.js"></script>
    <script src="userDetails.js"></script>

</body>

</html>
